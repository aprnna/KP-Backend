# Backend Deployment - KP-Backend (SINTA Scraper)
# Production deployment with MySQL and Nginx reverse proxy

services:
  mysql:
    image: mysql:8.0
    container_name: backend_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: kp_scrapping
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-kp-backend:latest}
    container_name: backend_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    # DNS servers for external hostname resolution
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Force hostname resolution for SINTA (Docker DNS issue on Windows)
    extra_hosts:
      - "sinta.kemdiktisaintek.go.id:16.79.54.7"
    environment:
      # Database connection
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: kp_scrapping
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # API security
      API_KEY: ${API_KEY}
      # SINTA scraper config
      SINTA_BASE_URL: https://sinta.kemdiktisaintek.go.id
      SINTA_AFFILIATION_ID: ${SINTA_AFFILIATION_ID:-528}
      SINTA_REQUEST_DELAY: ${SINTA_REQUEST_DELAY:-1.0}
      SINTA_MAX_RETRIES: ${SINTA_MAX_RETRIES:-3}
      # Scheduler
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCRAPE_DAY_OF_MONTH: ${SCRAPE_DAY_OF_MONTH:-1}
      # Security
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      # App config
      APP_NAME: KP-Backend
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: backend_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${API_PORT:-8000}:80"
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend_network

volumes:
  mysql_data:

networks:
  backend_network:
    driver: bridge